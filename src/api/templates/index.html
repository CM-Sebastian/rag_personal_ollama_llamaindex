<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/styles.css">
    <title>RAG Project</title>
</head>
<body>
    <header class="elemento-header">
        <div class="titulo-header">
            <h1>QWEN 2.5:1.5b</h1>      
            <img src=""/>      
        </div>
        <div class="opciones-header">
            <button>Ajustes</button>
            
        </div>
    </header>
    <section class="contenido-section">
        <aside class="menu-aside">
            <nav>
                <div id="menu-div" aria-label="Navegación principal">
                
                    <button id="NuevoChat">Nuevo Chat</button>
                    <button id="CambiarRol">Cambiar Rol</button>
                    <div id="rol-div" style="display: none;">
                        <button id="CerrarRoles-button">X</button>
                        <button id="rolRecultador">Reclutador</button>
                        <button id="rolCliente">Cliente</button>
                        <button id="rolEstudiante">Estudiante</button>
                        <button id="rolColega">Colega profesional</button>
                        <button id="rolPublico">Publico general</button>

                    </div>

                    <button id="Debug">Debug</button>
                
                </div>
            </nav>
        </aside>
        <div class="chat-div">
            <div class="chat-cabecera">
                <h2>Chat</h2>
                <span class="estado-punto"></span>
            </div>
            
            <div class="chat-mensajes" id="chatMensajes">
                <div class="mensaje recibido">
                <p>¡Hola! ¿En qué podemos ayudarte hoy?</p>
                </div>
                <div class="mensaje enviado">
                <p>Hola, necesito ayuda con mi cuenta.</p>
                </div>
            </div>
            
            <div class="chat-entrada">
                <textarea id="textoMensaje" placeholder="Escribe un mensaje..." rows="1"></textarea>
                <button id="botonEnviar">Enviar</button>
            </div>
        </div>


    </section>


    <script src="../static/main.js"></script>     
</body>
</html>
